<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TimberSmith Workforce Terminal</title>
    
    <!-- Dependencies -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Firebase SDKs (Compat Version for maximum stability in Single-File apps) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        @keyframes scan { 0% { top: 0%; } 100% { top: 100%; } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-4px); } 75% { transform: translateX(4px); } }
        .animate-shake { animation: shake 0.2s ease-in-out infinite; }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        body { background: #000; overflow: hidden; height: 100vh; margin: 0; color: white; font-family: ui-sans-serif, system-ui, -apple-system, sans-serif; }
        video { transform: scaleX(-1); }
        .lucide { display: inline-block; vertical-align: middle; }
        
        /* Initial loading state before React mounts */
        #root:empty::before {
            content: 'SYSTEM INITIALIZING...';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ff8c00;
            font-weight: 900;
            letter-spacing: 0.2em;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- FIREBASE CONFIGURATION (Using your provided project details) ---
        const firebaseConfig = {
            apiKey: "AIzaSyA4J1TVcpqNBvBoq242vXWwguAAnh3G6ks",
            authDomain: "timbersmithapp.firebaseapp.com",
            projectId: "timbersmithapp",
            storageBucket: "timbersmithapp.appspot.com",
            messagingSenderId: "1056525791334", 
            appId: "1:1056525791334:web:0f4a86071477439775f0f3"
        };

        const ADMIN_PIN = "2026"; 
        const SUPER_USER_PIN = "Melkmy74";
        const APP_ID_PATH = 'timbersmith-terminal-v1';

        // Initialize Firebase
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const auth = firebase.auth();
        const db = firebase.firestore();

        const Icon = ({ name, size = 24, className = "", strokeWidth = 2 }) => {
            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [name, size, className]);
            return <i data-lucide={name} className={className} style={{ width: size, height: size, strokeWidth: strokeWidth }}></i>;
        };

        const NavButton = ({ iconName, tooltip, active, onClick, disabled = false, colorClass = "" }) => (
            <div className="relative group flex items-center">
                <div className="absolute bottom-full mb-5 left-1/2 -translate-x-1/2 px-4 py-2 bg-black/95 backdrop-blur-md border border-white/10 rounded-2xl opacity-0 group-hover:opacity-100 transition-all duration-300 pointer-events-none whitespace-nowrap z-[100] shadow-2xl">
                    <p className="text-[11px] font-black uppercase tracking-widest text-white italic">{tooltip}</p>
                    <div className="absolute top-full left-1/2 -translate-x-1/2 border-[8px] border-transparent border-t-black/95"></div>
                </div>
                <button 
                    onClick={onClick} 
                    disabled={disabled} 
                    className={`p-4 rounded-full transition-all duration-300 ${active ? (colorClass || 'bg-white/10 text-white shadow-inner scale-110') : 'text-gray-600 hover:bg-white/5 hover:text-gray-200'} ${disabled ? 'opacity-10 pointer-events-none' : 'opacity-100 hover:scale-110'}`}
                >
                    <Icon name={iconName} size={22} strokeWidth={active ? 3 : 2} />
                </button>
            </div>
        );

        const TimberSmithApp = () => {
            const [user, setUser] = useState(null);
            const [error, setError] = useState(null);
            const [employees, setEmployees] = useState([]);
            const [currentTime, setCurrentTime] = useState(new Date());
            const [appMode, setAppMode] = useState('employee'); 
            const [isLocked, setIsLocked] = useState(true); 
            const [showPinModal, setShowPinModal] = useState(false);
            const [pinInput, setPinInput] = useState('');
            const [view, setView] = useState('dashboard'); 
            const [selectedEmployee, setSelectedEmployee] = useState(null);
            const [scanComplete, setScanComplete] = useState(false);
            const [showSuperModal, setShowSuperModal] = useState(false);
            const [superPinInput, setSuperPinInput] = useState('');
            const [targetDelete, setTargetDelete] = useState(null);
            const [personalPinInput, setPersonalPinInput] = useState('');
            const [personalPinError, setPersonalPinError] = useState(false);
            const [enrollForm, setEnrollForm] = useState({ name: '', surname: '', role: 'Artisan', pin: '' });
            const [isSaving, setIsSaving] = useState(false);

            const videoRef = useRef(null);

            // Authentication and Data Sync
            useEffect(() => {
                const unsubscribeAuth = auth.onAuthStateChanged(async (u) => {
                    if (u) {
                        setUser(u);
                        // Setup Real-time listener for employees
                        const empCol = db.collection('artifacts').doc(APP_ID_PATH).collection('public').doc('data').collection('employees');
                        return empCol.onSnapshot((snapshot) => {
                            setEmployees(snapshot.docs.map(d => ({ id: d.id, ...d.data() })));
                        }, (err) => {
                            console.error("Firestore error", err);
                            if (err.code === 'permission-denied') {
                                setError("DATABASE ERROR: Permission Denied. Check your Firestore Rules.");
                            }
                        });
                    } else {
                        try {
                            await auth.signInAnonymously();
                        } catch (e) {
                            setError(e.message === "auth/admin-restricted-operation" ? "ANONYMOUS AUTH IS DISABLED: Enable it in Firebase Console." : e.message);
                        }
                    }
                });

                const timer = setInterval(() => setCurrentTime(new Date()), 1000);
                return () => { unsubscribeAuth(); clearInterval(timer); };
            }, []);

            // Camera handling
            useEffect(() => {
                if (view === 'scanning' && videoRef.current) {
                    navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
                        .then(s => { if(videoRef.current) videoRef.current.srcObject = s; })
                        .catch(err => console.warn("Camera blocked."));
                }
            }, [view]);

            const handleAdminPin = (n) => {
                const newPin = pinInput + n;
                setPinInput(newPin);
                if (newPin === ADMIN_PIN) {
                    setIsLocked(false); setShowPinModal(false); setPinInput(''); setAppMode('admin'); setView('dashboard');
                } else if (newPin.length >= 4) { setPinInput(''); }
            };

            const handleFaceVerified = () => {
                setScanComplete(true);
                setTimeout(() => setView('personal_pin_entry'), 1000);
            };

            const handlePersonalPinDigit = (digit) => {
                if (personalPinInput.length < 4) {
                    const newPin = personalPinInput + digit;
                    setPersonalPinInput(newPin);
                    if (newPin.length === 4) {
                        if (newPin === selectedEmployee.personalCode) {
                            processClockEvent(selectedEmployee);
                        } else {
                            setPersonalPinError(true);
                            setTimeout(() => { setPersonalPinInput(''); setPersonalPinError(false); }, 800);
                        }
                    }
                }
            };

            const processClockEvent = async (emp) => {
                setIsSaving(true);
                const newStatus = emp.status === 'In' ? 'Out' : 'In';
                const empRef = db.collection('artifacts').doc(APP_ID_PATH).collection('public').doc('data').collection('employees').doc(emp.id);
                try {
                    await empRef.update({ 
                        status: newStatus, 
                        lastClock: currentTime.toLocaleTimeString() 
                    });
                    setView('success_screen');
                    setPersonalPinInput('');
                    setTimeout(() => { setView('dashboard'); setSelectedEmployee(null); setScanComplete(false); setIsSaving(false); }, 2500);
                } catch (e) {
                    setError("Failed to update status.");
                    setIsSaving(false);
                }
            };

            const handleEnrollSubmit = async (e) => {
                e.preventDefault();
                setIsSaving(true);
                try {
                    const empCol = db.collection('artifacts').doc(APP_ID_PATH).collection('public').doc('data').collection('employees');
                    await empCol.add({
                        name: enrollForm.name,
                        surname: enrollForm.surname,
                        role: enrollForm.role,
                        status: 'Out',
                        todayHours: 0, weeklyHours: 0, yesterdayHours: 0, monthlyHours: 0,
                        personalCode: enrollForm.pin,
                        createdAt: new Date().toISOString()
                    });
                    setEnrollForm({ name: '', surname: '', role: 'Artisan', pin: '' });
                    setView('dashboard');
                } catch (e) {
                    setError("Failed to enroll artisan. Check permissions.");
                } finally {
                    setIsSaving(false);
                }
            };

            const removeEmployee = async () => {
                if (superPinInput === SUPER_USER_PIN) {
                    const empRef = db.collection('artifacts').doc(APP_ID_PATH).collection('public').doc('data').collection('employees').doc(targetDelete.id);
                    await empRef.delete();
                    setShowSuperModal(false); setSuperPinInput('');
                }
            };

            const PhotoAvatar = ({ emp, size = 40, className = "" }) => (
                <div className={`rounded-2xl flex items-center justify-center overflow-hidden border-2 border-white/10 shadow-inner bg-[#111] ${className}`} 
                     style={{ width: size, height: size }}>
                    <span className="font-black text-white opacity-50 uppercase" style={{ fontSize: size * 0.4 }}>{emp.name?.[0]}</span>
                </div>
            );

            if (error) return (
                <div className="h-screen bg-black flex flex-col items-center justify-center p-12 text-center animate-in fade-in">
                    <Icon name="shield-alert" size={60} className="text-red-500 mb-6" />
                    <h2 className="text-2xl font-black uppercase text-white mb-4 italic">Cloud Connection Alert</h2>
                    <div className="bg-[#111] border border-white/10 p-6 rounded-[2rem] max-w-lg mb-10 shadow-2xl">
                        <p className="text-gray-400 font-medium leading-relaxed italic text-sm">{error}</p>
                    </div>
                    <button onClick={() => window.location.reload()} className="px-12 py-4 bg-white text-black font-black uppercase rounded-full hover:scale-105 active:scale-95 transition-all">Retry Terminal Sync</button>
                </div>
            );

            if (!user) return (
                <div className="h-screen bg-black flex flex-col items-center justify-center">
                    <Icon name="hard-hat" size={80} className="text-[#ff8c00] animate-bounce mb-8" />
                    <div className="text-[#ff8c00] font-black italic tracking-[0.3em] animate-pulse uppercase text-xl">Cloud Handshake...</div>
                    <p className="text-[10px] text-gray-700 mt-6 uppercase font-black tracking-widest italic">Authenticating Timbersmith Terminal v1</p>
                </div>
            );

            return (
                <div className="h-screen w-full bg-[#161616] flex flex-col overflow-hidden relative text-white">
                    <header className={`p-6 border-b-2 ${!isLocked ? 'border-blue-500' : 'border-[#ff8c00]'} transition-all bg-black/40 backdrop-blur-md sticky top-0 z-50`}>
                        <div className="flex justify-between items-center px-4">
                            <div className="flex items-center space-x-3 text-[#ff8c00]">
                                <Icon name="hard-hat" size={28} className={!isLocked ? 'text-blue-500' : 'text-[#ff8c00]'} />
                                <h1 className="text-2xl font-black italic tracking-tighter uppercase leading-none text-white">TimberSmith</h1>
                            </div>
                            <div className="text-right">
                                <p className="text-xl font-mono font-black italic leading-none">{currentTime.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</p>
                                <p className="text-[9px] font-bold text-gray-500 uppercase mt-1 tracking-widest">{currentTime.toLocaleDateString([], { weekday: 'short', day: 'numeric', month: 'short' })}</p>
                            </div>
                        </div>
                    </header>

                    <main className="flex-1 overflow-y-auto p-6 custom-scrollbar pb-32">
                        {/* 1. DashboardSelection */}
                        {appMode === 'employee' && view === 'dashboard' && (
                            <div className="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-6 animate-in fade-in duration-500">
                                {employees.length === 0 ? (
                                    <div className="col-span-full py-20 flex flex-col items-center justify-center opacity-20 italic">
                                        <Icon name="users" size={64} />
                                        <p className="mt-4 font-black uppercase tracking-widest italic">Artisan Registry Empty</p>
                                        <p className="text-[8px] mt-2 uppercase font-black">Admin Access Required to Enroll Staff</p>
                                    </div>
                                ) : (
                                    employees.map(emp => (
                                        <div key={emp.id} className="bg-[#1e1e1e] p-6 rounded-[2.5rem] flex flex-col items-center border-2 border-transparent hover:border-[#ff8c00] transition-all cursor-pointer shadow-2xl active:scale-95 group" onClick={() => { setSelectedEmployee(emp); setView('emp_home'); }}>
                                            <div className="relative mb-4">
                                                <PhotoAvatar emp={emp} size={90} className="group-hover:scale-105 transition-transform" />
                                                <div className={`absolute -bottom-1 -right-1 w-6 h-6 rounded-full border-4 border-[#1e1e1e] ${emp.status === 'In' ? 'bg-green-500 animate-pulse shadow-[0_0_10px_#22c55e]' : 'bg-red-500'}`} />
                                            </div>
                                            <p className="font-black text-sm uppercase italic tracking-tighter text-center leading-none group-hover:text-[#ff8c00] transition-colors">{emp.name} {emp.surname}</p>
                                            <p className="text-[8px] text-gray-600 mt-2 font-black uppercase tracking-widest">{emp.role}</p>
                                        </div>
                                    ))
                                )}
                            </div>
                        )}

                        {/* Profile Actions */}
                        {view === 'emp_home' && selectedEmployee && (
                            <div className="max-w-4xl mx-auto p-10 bg-[#1e1e1e] rounded-[4rem] border border-white/5 shadow-2xl animate-in slide-in-from-bottom-10">
                                <div className="flex items-center gap-10 mb-14">
                                    <div className="w-32 h-32 rounded-[2rem] bg-gray-800 flex items-center justify-center font-black text-5xl border-4 border-[#ff8c00] uppercase text-white/20 shadow-2xl">{selectedEmployee.name?.[0]}</div>
                                    <div>
                                        <h2 className="text-5xl font-black uppercase italic tracking-tighter leading-none italic">{selectedEmployee.name} {selectedEmployee.surname}</h2>
                                        <p className="text-xl text-gray-500 font-black uppercase tracking-[0.3em] mt-3 italic">{selectedEmployee.role}</p>
                                    </div>
                                    <button onClick={() => setView('dashboard')} className="ml-auto p-5 bg-white/5 rounded-full text-gray-500 hover:text-white transition-all shadow-xl active:scale-90"><Icon name="x" size={32}/></button>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                    <button onClick={() => setView('scanning')} className="bg-black/40 p-12 rounded-[3.5rem] flex flex-col items-center gap-6 hover:border-[#ff8c00] border-2 border-transparent transition-all active:scale-95 shadow-inner">
                                        <Icon name="clock" size={64} className="text-[#ff8c00]" />
                                        <span className="font-black uppercase italic text-2xl text-white tracking-widest italic">Clocking</span>
                                    </button>
                                    <button onClick={() => {setAppMode('hr'); setView('dashboard');}} className="bg-black/40 p-12 rounded-[3.5rem] flex flex-col items-center gap-6 hover:border-indigo-500 border-2 border-transparent transition-all active:scale-95 shadow-inner">
                                        <Icon name="scale" size={64} className="text-indigo-400" />
                                        <span className="font-black uppercase italic text-2xl text-white tracking-widest italic">Compliance</span>
                                    </button>
                                </div>
                            </div>
                        )}

                        {/* Scan View */}
                        {view === 'scanning' && selectedEmployee && (
                            <div className="fixed inset-0 z-[200] bg-black/95 flex flex-col items-center justify-center p-12 animate-in zoom-in">
                                <div className="w-full max-w-xl aspect-square relative rounded-[4rem] overflow-hidden border-[12px] border-[#222] shadow-2xl">
                                    <video ref={videoRef} autoPlay playsInline muted className="absolute inset-0 w-full h-full object-cover grayscale opacity-40 scale-x-[-1]" />
                                    <div className="absolute inset-0 flex flex-col items-center justify-center p-10">
                                        <div className={`w-3/4 aspect-square border-4 rounded-[4rem] transition-all duration-700 ${scanComplete ? 'border-green-500 scale-105' : 'border-[#ff8c00] animate-pulse'}`}>
                                            <div className="absolute inset-0 opacity-10 flex items-center justify-center"><Icon name="fingerprint" size={150}/></div>
                                            {!scanComplete && <div className="absolute w-full h-2 bg-[#ff8c00] top-0 animate-[scan_2s_linear_infinite] shadow-[0_0_30px_#ff8c00]" />}
                                        </div>
                                    </div>
                                </div>
                                <h3 className="mt-10 text-[#ff8c00] font-black uppercase text-xl tracking-[0.5em] animate-pulse italic">Scanning: {selectedEmployee.name}</h3>
                                <div className="mt-12 flex gap-10">
                                    <button onClick={handleFaceVerified} className="bg-emerald-600 text-black px-12 py-5 rounded-[2rem] font-black uppercase text-sm tracking-widest shadow-2xl active:scale-95 hover:bg-emerald-500 transition-all">Verify Identity</button>
                                    <button onClick={() => setView('emp_home')} className="text-gray-500 font-black uppercase text-xs tracking-widest underline decoration-2 underline-offset-8 transition-colors hover:text-white">Abort</button>
                                </div>
                            </div>
                        )}

                        {/* PIN Entry */}
                        {view === 'personal_pin_entry' && selectedEmployee && (
                            <div className="fixed inset-0 z-[300] bg-[#0f0f0f] flex flex-col items-center justify-center animate-in slide-in-from-bottom-10 duration-500">
                                <div className="bg-[#1e1e1e] p-10 rounded-[4rem] border border-white/10 text-center w-full max-w-sm shadow-2xl">
                                    <Icon name="key-round" size={64} className="mx-auto text-blue-500 mb-6" />
                                    <h2 className="text-2xl font-black uppercase italic tracking-tighter mb-1 text-white italic">Enter Personal PIN</h2>
                                    <p className="text-gray-500 text-[10px] font-black uppercase mb-10 tracking-widest italic">{selectedEmployee.name} {selectedEmployee.surname}</p>
                                    <div className="flex justify-center space-x-4 mb-12">
                                        {[1,2,3,4].map(i => <div key={i} className={`h-4 w-4 rounded-full transition-all ${personalPinInput.length >= i ? (personalPinError ? 'bg-red-500' : 'bg-blue-500') : 'bg-white/10'}`} />)}
                                    </div>
                                    <div className="grid grid-cols-3 gap-4">
                                        {[1,2,3,4,5,6,7,8,9, 'C', 0, 'X'].map(n => (
                                            <button key={n} className="h-16 bg-white/5 rounded-2xl font-black text-xl text-white active:bg-blue-600 transition-all" onClick={() => n === 'X' ? setView('emp_home') : n === 'C' ? setPersonalPinInput('') : handlePersonalPinDigit(n.toString())}>{n}</button>
                                        ))}
                                    </div>
                                    {personalPinError && <p className="mt-6 text-red-500 font-black uppercase text-[10px] animate-pulse italic">Invalid Security Key</p>}
                                </div>
                            </div>
                        )}

                        {/* Enrollment */}
                        {view === 'registration' && (
                            <div className="max-w-3xl mx-auto p-10 bg-[#1e1e1e] rounded-[4rem] border border-white/5 shadow-2xl animate-in slide-in-from-right-10 duration-500">
                                <div className="flex items-center justify-between mb-10 text-white italic">
                                    <h2 className="text-3xl font-black uppercase italic tracking-tighter">New Artisan Enrollment</h2>
                                    <button onClick={() => setView('dashboard')} className="p-4 bg-white/5 rounded-full"><Icon name="x" /></button>
                                </div>
                                <form onSubmit={handleEnrollSubmit} className="space-y-8 text-left text-white">
                                    <div className="grid grid-cols-2 gap-8">
                                        <div className="space-y-2">
                                            <label className="text-[10px] font-black uppercase text-gray-500 ml-4 italic tracking-widest">First Name</label>
                                            <input required className="w-full bg-black border border-white/10 rounded-3xl p-6 outline-none focus:border-blue-500 font-bold transition-all" value={enrollForm.name} onChange={e => setEnrollForm({...enrollForm, name: e.target.value})} />
                                        </div>
                                        <div className="space-y-2">
                                            <label className="text-[10px] font-black uppercase text-gray-500 ml-4 italic tracking-widest">Surname</label>
                                            <input required className="w-full bg-black border border-white/10 rounded-3xl p-6 outline-none focus:border-blue-500 font-bold transition-all" value={enrollForm.surname} onChange={e => setEnrollForm({...enrollForm, surname: e.target.value})} />
                                        </div>
                                        <div className="space-y-2">
                                            <label className="text-[10px] font-black uppercase text-gray-500 ml-4 italic tracking-widest">Role</label>
                                            <select className="w-full bg-black border border-white/10 rounded-3xl p-6 outline-none focus:border-blue-500 font-bold appearance-none px-6 transition-all" value={enrollForm.role} onChange={e => setEnrollForm({...enrollForm, role: e.target.value})}>
                                                <option>Artisan</option><option>Master Carpenter</option><option>Joiner</option><option>Apprentice</option>
                                            </select>
                                        </div>
                                        <div className="space-y-2">
                                            <label className="text-[10px] font-black uppercase text-orange-500 ml-4 italic tracking-widest">Set 4-Digit PIN</label>
                                            <input required maxLength="4" placeholder="4 Digits" className="w-full bg-black border border-orange-500/20 p-6 rounded-3xl outline-none focus:border-orange-500 text-orange-500 font-black tracking-widest text-center transition-all" value={enrollForm.pin} onChange={e => setEnrollForm({...enrollForm, pin: e.target.value})} />
                                        </div>
                                    </div>
                                    <button type="submit" disabled={isSaving} className="w-full py-8 bg-blue-600 rounded-[3rem] font-black uppercase tracking-[0.3em] text-sm shadow-xl active:scale-95 transition-all text-white italic disabled:opacity-30">
                                        {isSaving ? 'Saving to Cloud...' : 'Commit to Cloud Registry'}
                                    </button>
                                </form>
                            </div>
                        )}

                        {/* Admin List */}
                        {appMode === 'admin' && view === 'dashboard' && (
                             <div className="bg-[#1e1e1e] rounded-[3rem] border border-white/5 shadow-2xl overflow-hidden animate-in slide-in-from-right-10">
                                <div className="p-8 border-b border-white/5 bg-black/20 flex justify-between items-center text-white italic">
                                    <h2 className="text-xl font-black uppercase italic tracking-tighter italic">Artisan Registry Management</h2>
                                    <button onClick={() => setView('registration')} className="bg-blue-600 text-white px-6 py-3 rounded-2xl font-black uppercase text-[10px] tracking-widest shadow-xl flex items-center gap-2 active:scale-95 transition-all">
                                        <Icon name="user-plus" size={18} /><span>Enroll Carpenter</span>
                                    </button>
                                </div>
                                <div className="p-10 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 text-white">
                                    {employees.map(emp => (
                                        <div key={emp.id} className="bg-[#161616] p-8 rounded-[2.5rem] border border-white/5 flex flex-col group transition-all hover:bg-black/40">
                                            <div className="flex items-start space-x-6">
                                                <PhotoAvatar emp={emp} size={90} className="border-2 border-black" />
                                                <div className="flex-1 text-left">
                                                    <h3 className="text-xl font-black italic leading-none uppercase">{emp.name}</h3>
                                                    <p className="text-[10px] text-blue-500 font-black uppercase tracking-widest mt-2 italic">{emp.role}</p>
                                                </div>
                                                <button onClick={() => { setTargetDelete(emp); setShowSuperModal(true); }} className="text-red-500/20 hover:text-red-500 transition-all active:scale-90"><Icon name="trash-2" size={20} /></button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Supervisor PIN Modals */}
                    {showPinModal && (
                        <div className="fixed inset-0 z-[900] bg-black/90 backdrop-blur-xl flex items-center justify-center animate-in fade-in duration-300">
                            <div className="bg-[#1e1e1e] p-10 rounded-[3rem] text-center border border-white/10 w-80 shadow-2xl">
                                <Icon name="shield-alert" size={54} className="mx-auto text-blue-500 mb-6" />
                                <p className="text-[10px] font-black uppercase tracking-widest text-gray-500 mb-8 italic">Management Access</p>
                                <div className="flex justify-center space-x-3 mb-10">
                                    {[1,2,3,4].map(i => <div key={i} className={`w-3 h-3 rounded-full transition-all ${pinInput.length >= i ? 'bg-blue-500 shadow-[0_0_15px_#3b82f6]' : 'bg-white/10'}`} />)}
                                </div>
                                <div className="grid grid-cols-3 gap-4">
                                    {[1,2,3,4,5,6,7,8,9, 'C', 0, 'X'].map(n => (
                                        <button key={n} className="h-16 bg-white/5 rounded-2xl font-black text-xl text-white active:bg-blue-600 transition-all" onClick={() => n === 'X' ? setShowPinModal(false) : n === 'C' ? setPinInput('') : handleAdminPin(n.toString())}>{n}</button>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Delete Modal */}
                    {showSuperModal && (
                        <div className="fixed inset-0 z-[1000] bg-black/95 flex items-center justify-center animate-in fade-in duration-300">
                            <div className="bg-[#111] p-12 rounded-[4rem] border-2 border-red-500/20 text-center w-full max-w-md shadow-2xl text-white">
                                <Icon name="user-x" className="mx-auto text-red-500 mb-8 shadow-[0_0_20px_#ef444433]" size={64} />
                                <h2 className="text-2xl font-black uppercase italic mb-10 tracking-tighter leading-none italic italic text-center">Terminate Archive:<br/><span className="text-red-500">{targetDelete?.name}</span></h2>
                                <input type="password" placeholder="Super PIN" className="w-full bg-black border-2 border-white/10 p-6 rounded-3xl text-center text-3xl font-mono tracking-widest outline-none mb-10 focus:border-red-600 transition-all text-white" value={superPinInput} onChange={e => setSuperPinInput(e.target.value)} autoFocus />
                                <div className="flex gap-6">
                                    <button onClick={() => setShowSuperModal(false)} className="flex-1 py-6 bg-white/5 rounded-[2rem] font-black uppercase text-[10px] tracking-widest active:scale-95 text-white italic">Cancel</button>
                                    <button onClick={removeEmployee} className="flex-1 py-6 bg-red-600 rounded-[2rem] font-black uppercase text-[10px] tracking-widest shadow-xl active:scale-95 hover:bg-red-500 transition-all text-white italic">Authorize</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Success Message Overlay */}
                    {view === 'success_screen' && selectedEmployee && (
                        <div className="fixed inset-0 z-[1000] bg-[#0f0f0f] flex flex-col items-center justify-center p-12 text-center animate-in fade-in duration-500">
                            <div className="w-72 h-72 rounded-full border-[20px] border-green-500 p-2 shadow-[0_0_120px_rgba(34,197,94,0.4)] mb-16 overflow-hidden"><PhotoAvatar emp={selectedEmployee} size="100%" className="border-0 rounded-full" /></div>
                            <h2 className="text-9xl font-black italic uppercase tracking-tighter text-green-500 mb-6 leading-none italic text-white italic">VERIFIED</h2>
                            <p className="text-4xl font-black text-gray-500 uppercase tracking-[0.4em] mb-12 italic">{selectedEmployee.name} {selectedEmployee.surname}</p>
                            <div className="bg-[#1e1e1e] px-24 py-12 rounded-[5rem] border-b-[12px] border-green-500 shadow-2xl animate-in slide-in-from-bottom-10">
                                <p className="text-7xl font-mono font-black italic text-white uppercase">{selectedEmployee.status === 'In' ? 'Shift Started' : 'Shift Completed'}</p>
                            </div>
                        </div>
                    )}

                    {/* Navigation Bar */}
                    <footer className="fixed bottom-8 left-1/2 -translate-x-1/2 bg-black/90 backdrop-blur-3xl p-3 rounded-full border border-white/10 flex items-center gap-4 shadow-2xl z-50 transition-all">
                        <NavButton iconName="layout-dashboard" tooltip="Dashboard Home" active={appMode === 'employee'} onClick={() => { setAppMode('employee'); setView('dashboard'); setSelectedEmployee(null); }} />
                        <div className="w-[1px] h-10 bg-white/10 mx-1" />
                        <NavButton iconName={isLocked ? "lock" : "unlock"} tooltip="Unlock Admin Terminal" active={!isLocked} colorClass="text-blue-500 bg-blue-500/10" onClick={() => isLocked ? setShowPinModal(true) : setIsLocked(true)} />
                        {!isLocked && (
                            <div className="flex gap-4 border-l border-white/10 pl-4 animate-in slide-in-from-left-5">
                                <NavButton iconName="users" tooltip="Staff Registry" active={appMode === 'admin'} colorClass="bg-blue-600 text-white shadow-xl" onClick={() => { setAppMode('admin'); setView('dashboard'); }} />
                                <NavButton iconName="bar-chart-3" tooltip="Shift Analytics" active={appMode === 'analytics'} colorClass="bg-white/10 text-blue-400 shadow-inner" onClick={() => { setAppMode('analytics'); setView('dashboard'); }} />
                                <NavButton iconName="scale" tooltip="Compliance Vault" active={appMode === 'hr'} colorClass="bg-indigo-600 text-white shadow-xl shadow-indigo-600/20" onClick={() => { setAppMode('hr'); setView('dashboard'); }} />
                            </div>
                        )}
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<TimberSmithApp />);
    </script>
</body>
</html>
